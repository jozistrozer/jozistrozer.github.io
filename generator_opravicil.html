<!DOCTYPE html>
<html>
    <head>

        <title>Generator opravičil</title>

        <script>
            $(document).ready(function(){
                $('input[name="chkSpol"]').on('change', function() {
                    $(this).siblings('input[type="checkbox"]').prop('checked', false);
                });
            });
            
            var izgovori = ["slabega počutja.", "obiska rednega pregleda zobozdravnika.", "",];
        </script>
    </head>
    <body>
        <h1>Generator opravičil</h1>
        <p>Prikrajšaj si čas in generiraj opravičilo.</p>
        <form action="">
            <p>Ime: <input type="text" name="ime"></p>
            <p>Priimek: <input type="text" name="priimek"></p>
            Moški<input type="checkbox" name="chkSpol"><br>
            Ženska<input type="checkbox" name="chkSpol"><br>

                6<input type="checkbox" id="ura6"><br>
                7<input type="checkbox" id="ura7"><br>

            <input type="submit" value="Generiraj">

    </body>
</html>
